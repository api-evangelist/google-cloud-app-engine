apis:
  - name: Google Cloud App Engine Admin API
    description: >-
      The App Engine Admin API enables developers to provision and manage their
      App Engine applications programmatically, including deploying new versions,
      managing traffic splitting, configuring services, and monitoring application
      health.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cloud.google.com/appengine/docs/admin-api
    baseURL: https://appengine.googleapis.com
