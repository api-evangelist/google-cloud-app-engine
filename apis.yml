name: Google Cloud App Engine
description: >-
  Google Cloud App Engine is a fully managed, serverless platform for developing
  and hosting web applications at scale. It supports popular programming languages
  and provides built-in services and APIs such as NoSQL datastores, memcache, and
  a user authentication API, allowing developers to focus on writing code without
  managing the underlying infrastructure.
